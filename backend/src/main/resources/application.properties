# Name of this app, shown in logs. No functional effect on behavior.
spring.application.name=backend

# --- Database connection ---
# JDBC connection string: protocol + host:port + database name.
spring.datasource.url=jdbc:postgresql://localhost:5432/ballers
# Login username for Postgres. Not sensitive, so it's fine to leave as plain text.
spring.datasource.username=postgres
# Password is NOT hardcoded - Spring resolves ${DB_PASSWORD} from an environment
# variable at startup, so the real secret never lives in this file / source control.
spring.datasource.password=${DB_PASSWORD}
# Which JDBC driver class to use to talk to Postgres (usually inferable from the URL above,
# but spelled out explicitly here).
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# "update" = Hibernate adds missing tables/columns based on @Entity classes on startup,
# but never deletes or destructively changes existing ones. Fine for local dev; in a real
# production app you'd use validate/none plus a migration tool like Flyway or Liquibase.
spring.jpa.hibernate.ddl-auto=update
# Print every SQL statement Hibernate generates to the console.
spring.jpa.show-sql=true
# Pretty-print that logged SQL (indentation/line breaks) instead of one long line.
spring.jpa.properties.hibernate.format_sql=true
